name: Build EPG

on:
  schedule:
    - cron: '0 */6 * * *'   # Alle 6 Stunden
  workflow_dispatch:         # Manueller Trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run TV7 EPG Parser
        run: |
          # -u = unbuffered output, damit print() sofort im Log erscheint
          python -u main.py
          echo ""
          echo "=== Inhalt des Workspace nach Parser-Lauf: ==="
          ls -la
          echo ""
          echo "=== Erzeugte XML-Dateien: ==="
          ls -la tv7_*.xml 2>/dev/null || echo "(KEINE XML-Dateien erzeugt!)"

      - name: Verify XML files were generated
        run: |
          shopt -s nullglob
          xml_files=(tv7_*.xml)
          if [ ${#xml_files[@]} -eq 0 ]; then
            echo "::error::Parser hat keine XML-Dateien erzeugt. Init7 und/oder Teleboy sind aus dem GitHub-Runner nicht erreichbar (möglicher IP-Block), oder beide APIs sind aktuell down. Siehe Parser-Output im vorigen Step."
            exit 1
          fi
          echo "[✓] ${#xml_files[@]} XML-Datei(en) gefunden:"
          ls -la "${xml_files[@]}"

      - name: Publish XML to epg-data branch
        run: |
          set -euxo pipefail

          # 1) XML-Dateien sichern
          mkdir -p /tmp/epg-output
          cp tv7_*.xml /tmp/epg-output/
          ls -la /tmp/epg-output/

          # 2) Git Identity
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 3) Frischer Orphan-Branch
          git checkout --orphan epg-data
          git reset
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          # 4) Nur die XML-Dateien einspielen
          cp /tmp/epg-output/*.xml .
          ls -la

          # 5) Commit & Force-Push
          git add tv7_*.xml
          git commit -m "Update EPG $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push --force origin epg-data
